{% extends "base.html" %}
{% block title %}Tickets - DeskHive{% endblock %}

{% block body %}
<nav class="container-fluid">
    <ul><li><strong>DeskHive</strong></li></ul>
    <ul>
        <li><a href="/">Dashboard</a></li>
        <li><a href="/tickets" class="contrast">Tickets</a></li>
        <li><a href="/team">Team</a></li>
        <li><a href="/settings">Settings</a></li>
        <li><a href="#" id="logoutBtn">Logout</a></li>
    </ul>
</nav>

<main class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h1 style="margin:0;">Tickets</h1>
        <button id="newTicketBtn" class="contrast">+ Neues Ticket</button>
    </div>

    <!-- Filters -->
    <div class="grid" style="margin-bottom: 1rem;">
        <select id="filterStatus">
            <option value="">Alle Status</option>
            <option value="open">Offen</option>
            <option value="in_progress">In Bearbeitung</option>
            <option value="waiting">Wartend</option>
            <option value="resolved">Geloest</option>
            <option value="closed">Geschlossen</option>
        </select>
        <select id="filterPriority">
            <option value="">Alle Prioritaeten</option>
            <option value="low">Niedrig</option>
            <option value="medium">Mittel</option>
            <option value="high">Hoch</option>
            <option value="urgent">Dringend</option>
        </select>
        <input type="search" id="filterSearch" placeholder="Suche...">
    </div>

    <!-- Ticket List -->
    <table role="grid">
        <thead>
            <tr>
                <th>#</th>
                <th>Betreff</th>
                <th>Kunde</th>
                <th>Status</th>
                <th>Prioritaet</th>
                <th>Erstellt</th>
            </tr>
        </thead>
        <tbody id="ticketList">
            <tr><td colspan="6" style="text-align:center;">Lade...</td></tr>
        </tbody>
    </table>

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span id="ticketCount"></span>
        <div>
            <button id="prevPage" class="outline" disabled>&lt; Zurueck</button>
            <button id="nextPage" class="outline">Weiter &gt;</button>
        </div>
    </div>

    <!-- New Ticket Dialog -->
    <dialog id="newTicketDialog">
        <article style="min-width: 400px;">
            <header><h3>Neues Ticket</h3></header>
            <form id="newTicketForm">
                <label>Kunden-Email
                    <input type="email" name="customer_email" required>
                </label>
                <label>Kundenname
                    <input type="text" name="customer_name">
                </label>
                <label>Betreff
                    <input type="text" name="subject" required>
                </label>
                <label>Beschreibung
                    <textarea name="body" required rows="4"></textarea>
                </label>
                <label>Prioritaet
                    <select name="priority">
                        <option value="low">Niedrig</option>
                        <option value="medium" selected>Mittel</option>
                        <option value="high">Hoch</option>
                        <option value="urgent">Dringend</option>
                    </select>
                </label>
                <div id="newTicketError" style="color:var(--pico-color-red-500); display:none;"></div>
                <footer style="display:flex;gap:0.5rem;justify-content:flex-end;">
                    <button type="button" class="outline" onclick="document.getElementById('newTicketDialog').close()">Abbrechen</button>
                    <button type="submit">Erstellen</button>
                </footer>
            </form>
        </article>
    </dialog>
</main>
{% endblock %}

{% block scripts %}
<script>
const token = localStorage.getItem('access_token');
if (!token) window.location.href = '/login';

let currentPage = 1;
const perPage = 20;

const statusLabels = {open:'Offen', in_progress:'In Bearbeitung', waiting:'Wartend', resolved:'Geloest', closed:'Geschlossen'};
const prioLabels = {low:'Niedrig', medium:'Mittel', high:'Hoch', urgent:'Dringend'};
const prioColors = {low:'', medium:'', high:'color:orange;', urgent:'color:red;font-weight:bold;'};

async function apiFetch(url, opts = {}) {
    opts.headers = {...(opts.headers || {}), 'Authorization': 'Bearer ' + token};
    const res = await fetch(url, opts);
    if (res.status === 401) { localStorage.removeItem('access_token'); window.location.href = '/login'; }
    return res;
}

async function loadTickets() {
    const status = document.getElementById('filterStatus').value;
    const priority = document.getElementById('filterPriority').value;
    const search = document.getElementById('filterSearch').value;

    let url = `/api/tickets?page=${currentPage}&per_page=${perPage}`;
    if (status) url += `&status=${status}`;
    if (priority) url += `&priority=${priority}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;

    const res = await apiFetch(url);
    const data = await res.json();

    const tbody = document.getElementById('ticketList');
    if (!data.tickets || data.tickets.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Keine Tickets gefunden</td></tr>';
    } else {
        tbody.innerHTML = data.tickets.map(t => `
            <tr style="cursor:pointer;" onclick="window.location.href='/tickets/${t.id}'">
                <td>${t.ticket_number}</td>
                <td>${t.subject}</td>
                <td>${t.customer_email || '-'}</td>
                <td>${statusLabels[t.status] || t.status}</td>
                <td style="${prioColors[t.priority] || ''}">${prioLabels[t.priority] || t.priority}</td>
                <td>${new Date(t.created_at).toLocaleDateString('de-DE')}</td>
            </tr>
        `).join('');
    }

    document.getElementById('ticketCount').textContent = `${data.total} Ticket(s)`;
    document.getElementById('prevPage').disabled = currentPage <= 1;
    document.getElementById('nextPage').disabled = currentPage * perPage >= data.total;
}

document.getElementById('filterStatus').addEventListener('change', () => { currentPage = 1; loadTickets(); });
document.getElementById('filterPriority').addEventListener('change', () => { currentPage = 1; loadTickets(); });

let searchTimeout;
document.getElementById('filterSearch').addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => { currentPage = 1; loadTickets(); }, 300);
});

document.getElementById('prevPage').addEventListener('click', () => { if (currentPage > 1) { currentPage--; loadTickets(); }});
document.getElementById('nextPage').addEventListener('click', () => { currentPage++; loadTickets(); });

document.getElementById('newTicketBtn').addEventListener('click', () => {
    document.getElementById('newTicketDialog').showModal();
});

document.getElementById('newTicketForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const errEl = document.getElementById('newTicketError');
    errEl.style.display = 'none';

    const body = {
        customer_email: form.customer_email.value,
        customer_name: form.customer_name.value || null,
        subject: form.subject.value,
        body: form.body.value,
        priority: form.priority.value,
    };

    const res = await apiFetch('/api/tickets', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
    });

    if (!res.ok) {
        const data = await res.json();
        errEl.textContent = data.detail || 'Fehler';
        errEl.style.display = 'block';
        return;
    }

    const ticket = await res.json();
    document.getElementById('newTicketDialog').close();
    form.reset();
    window.location.href = `/tickets/${ticket.id}`;
});

document.getElementById('logoutBtn').addEventListener('click', async (e) => {
    e.preventDefault();
    await fetch('/api/auth/logout', {method: 'POST'});
    localStorage.removeItem('access_token');
    window.location.href = '/login';
});

loadTickets();
</script>
{% endblock %}
